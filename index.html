.sale-note { font-size: 12px; color: #666; margin-top: 8px; display: flex; align-items: center; gap: 4px; }

var currentIsKn=false, currentKinenbi=null;

function show(id){
  document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

function buildUpcoming(){
  var items=[];
  var y=TODAY.getFullYear(), m=TODAY.getMonth()+1, d=TODAY.getDate();
  for(var mo=0;mo<3;mo++){
    var nm=m+mo; var ny=y; if(nm>12){nm-=12;ny++;}
    MONTHLY.forEach(function(k){
      var dt=new Date(ny,nm-1,k.day);
      var diff=Math.round((dt-TODAY)/86400000);
      if(diff>=0&&diff<=90) items.push({dt:dt,diff:diff,k:k});
    });
  }
  ANNUAL.forEach(function(k){
    var dt=new Date(y,k.month-1,k.day);
    if(dt<TODAY) dt=new Date(y+1,k.month-1,k.day);
    var diff=Math.round((dt-TODAY)/86400000);
    items.push({dt:dt,diff:diff,k:k});
  });
  items.sort(function(a,b){return a.dt-b.dt;});
  return items;
}

function goKn(){
  var items=buildUpcoming();
  var ul=document.getElementById('knlist');
  ul.innerHTML='';
  items.forEach(function(item){
    var k=item.k;
    var isToday=item.diff===0;
    var dateStr=isToday?'今日':(item.diff===1?'明日':item.diff+'日後（'+(item.dt.getMonth()+1)+'/'+(item.dt.getDate())+'）');
    var li=document.createElement('li');
    li.className=isToday?'today':'';
    li.innerHTML='<div><div class="knd" style="color:'+k.tc+';">'+dateStr+(isToday?'<span class="today-badge">今日</span>':'')+'</div><div class="knt">'+k.name+'</div><div class="kns">'+k.desc+'</div></div><i class="ti ti-chevron-right" style="color:#aaa;" aria-hidden="true"></i>';
    li.onclick=(function(kk){return function(){openKn(kk);};})(k);
    ul.appendChild(li);
  });
  show('s4');
}

function openKn(k){
  currentKinenbi=k; currentIsKn=true;
  renderList(k.recipes,'kinenbi',k.name,k.c,k.tc,'s4');
  show('s2');
}

function go(mode){
  currentIsKn=false; currentKinenbi=null;
  var mconf={speed:{label:'パパっとモード',bg:'#e6f1fb',tc:'#185fa5'},medium:{label:'ちょっと本格モード',bg:'#e1f5ee',tc:'#0f6e56'},slow:{label:'じっくりモード',bg:'#faeeda',tc:'#854f0b'}};
  var mc=mconf[mode];
  renderList(RDB[mode],mode,mc.label,mc.bg,mc.tc,'s1');
  show('s2');
}

var currentRecipes=[], currentBackScreen='s1';

function renderList(recipes,mode,label,bg,tc,backSc){
  currentRecipes=recipes; currentBackScreen=backSc||'s1';
  document.getElementById('s2t').textContent=label;
  var tag=document.getElementById('s2tag');
  tag.textContent=label; tag.style.background=bg; tag.style.color=tc;
  document.getElementById('s2cnt').textContent=recipes.length+'品';
  var ul=document.getElementById('rlist'); ul.innerHTML='';
  recipes.forEach(function(r,i){
    var li=document.createElement('li');
    li.innerHTML='<div><div class="rn">'+r[0]+'</div><div class="rm">'+r[1]+'　難易度：'+r[2]+'</div></div><i class="ti ti-chevron-right" style="color:#aaa;" aria-hidden="true"></i>';
    li.onclick=(function(idx){return function(){openDetail(currentRecipes,idx);};})(i);
    ul.appendChild(li);
  });
}

function openDetail(recipes,idx){
  var r=recipes[idx];
  document.getElementById('dn').textContent=r[0];
  document.getElementById('dt').textContent=r[1];
  document.getElementById('dd').textContent=r[2];
  var kf=document.getElementById('kn-flag2');
  if(currentIsKn&&currentKinenbi){kf.style.display='flex';document.getElementById('kn-flag2-txt').textContent='今日は「'+currentKinenbi.name+'」にちなんだ献立です';}
  else{kf.style.display='none';}
  var hasSale=false,total=0,html='';
  r[3].forEach(function(i){
    if(i[4])hasSale=true; total+=i[2];
    html+='<tr><td>'+(i[4]?'<span class="sd" title="特売品"></span>':'')+i[0]+'</td><td class="iq">'+i[1]+'</td><td class="il">'+(i[3]!=='自宅'?'<span class="loc">'+i[3]+'</span>':'<span style="font-size:11px;color:#888;">自宅</span>')+'</td></tr>';
  });
  document.getElementById('itb').innerHTML=html;
  document.getElementById('salenote').style.display=hasSale?'flex':'none';
  document.getElementById('totv').textContent=total>0?'¥'+total+'前後':'';
  var sh=''; r[4].forEach(function(s,i){sh+='<li class="sl"><div class="sn">'+(i+1)+'</div><span>'+s+'</span></li>';});
  document.getElementById('slb').innerHTML=sh;
  document.getElementById('s3t').textContent=r[0];
  stab(0); show('s3');
}

function stab(n){
  [0,1].forEach(function(i){
    document.getElementById('tb'+i).className='tab'+(i===n?' on':'');
    document.getElementById('p'+i).className='panel'+(i===n?' on':'');
  });
}

(function(){
  var items=buildUpcoming();
  if(items.length>0){
    var first=items[0];
    document.getElementById('kn-top-title').textContent=(first.diff===0?'今日は「'+first.k.name+'」':first.diff+'日後：'+first.k.name);
    document.getElementById('kn-top-sub').textContent=first.k.desc;
  }
})();
